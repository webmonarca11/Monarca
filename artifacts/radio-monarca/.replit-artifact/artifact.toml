kind = "web"
previewPath = "/"
title = "Radio Monarca 106.7 FM"
version = "1.0.0"
id = "artifacts/radio-monarca"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23388

[services.development]
run = "pnpm --filter @workspace/radio-monarca run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/radio-monarca", "run", "build" ]
publicDir = "artifacts/radio-monarca/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23388"
BASE_PATH = "/"
